services:
  postgres:
    image: postgres:16-alpine
    container_name: yolo-dev-postgres
    environment:
      POSTGRES_USER: yolo
      POSTGRES_PASSWORD: yolo
      POSTGRES_DB: yolo_training
    volumes:
      - dev-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yolo -d yolo_training"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: yolo-dev-backend
    environment:
      STORAGE_ROOT: /app/storage
      DATABASE_URL: postgresql://yolo:yolo@postgres:5432/yolo_training
      SECRET_KEY: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000
    volumes:
      - ./backend:/app/backend
      - ./training_engine:/app/training_engine
      - ./configs:/app/configs
      - dev-storage:/app/storage
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.dev
    container_name: yolo-dev-frontend
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/frontend/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/frontend/tsconfig.node.json
      - ./frontend/eslint.config.js:/app/frontend/eslint.config.js
      - ./frontend/public:/app/frontend/public
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  dev-storage:
  dev-pgdata:
