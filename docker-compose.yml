version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: yolo-web
    ports:
      - "8000:8000"
    environment:
      STORAGE_ROOT: /app/storage
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
    volumes:
      - ./storage:/app/storage
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
